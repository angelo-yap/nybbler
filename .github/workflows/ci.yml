name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22 toolchain
        run: |
          # LLVM 22 is not in the ubuntu-24.04 base repos; pull it from
          # apt.llvm.org via the official installer script.
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y \
            llvm-22-dev llvm-22-tools llvm-22-runtime clang-22 cmake

      - name: Install lit
        run: |
          python3 -m pip install --user lit
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -S . -B build -DLLVM_DIR=/usr/lib/llvm-22/cmake

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: lit -v build/test/
